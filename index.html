<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Biblioteca Digital IMSIL — Acesse o acervo, reserve livros e acompanhe seus empréstimos.">
    <title>Login — Biblioteca Digital IMSIL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="auth-card">
            <h1><span class="logo-icon">📚</span> Biblioteca Digital</h1>
            <p class="subtitle">IMSIL — Sistema de Gestão de Acervo</p>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="toggleAuth('login')">Login</button>
                <button class="auth-tab" onclick="toggleAuth('register')">Cadastro</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginRA">RA / Login</label>
                    <input type="text" id="loginRA" placeholder="Digite seu RA ou login" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginSenha">Senha</label>
                    <input type="password" id="loginSenha" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Entrar no Sistema</button>
            </form>

            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="regNome">Nome Completo</label>
                    <input type="text" id="regNome" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="regRA">RA</label>
                    <input type="text" id="regRA" placeholder="Seu Registro Acadêmico" required>
                </div>
                <div class="form-group">
                    <label for="regSenha">Senha</label>
                    <input type="password" id="regSenha" placeholder="Crie uma senha" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Criar Conta</button>
            </form>

        </div>
    </div>

    <script src="js/config.js" onerror="console.log('[Config] config.js não encontrado, usando modo sem API Key.')"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Se já estiver logado, redireciona
        (() => {
            const user = Auth.getUsuarioAtual();
            if (user) {
                window.location.href = user.tipo === 'admin' ? 'admin.html' : 'dashboard.html';
                return;
            }
        })();

        function toggleAuth(type) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => {
                f.classList.remove('active');
                f.style.display = 'none';
            });
            
            if (type === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                setTimeout(() => document.getElementById('loginForm').classList.add('active'), 10);
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').style.display = 'block';
                setTimeout(() => document.getElementById('registerForm').classList.add('active'), 10);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const ra = document.getElementById('loginRA').value.trim();
            const senha = document.getElementById('loginSenha').value;

            const result = Auth.login(ra, senha);

            if (result.success) {
                UI.toast(`Bem-vindo, ${result.user.nome}!`, 'success');
                setTimeout(() => {
                    window.location.href = result.user.tipo === 'admin' ? 'admin.html' : 'dashboard.html';
                }, 600);
            } else {
                UI.toast(result.error, 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nome = document.getElementById('regNome').value.trim();
            const ra = document.getElementById('regRA').value.trim();
            const senha = document.getElementById('regSenha').value;

            const result = Auth.registrar(ra, nome, senha, 'aluno');

            if (result.success) {
                UI.toast('Conta criada com sucesso! Faça login.', 'success');
                document.getElementById('registerForm').reset();
                toggleAuth('login');
            } else {
                UI.toast(result.error, 'error');
            }
        });
    </script>
</body>
</html>
