<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca Digital</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="auth-card">
            <h1>📚 Biblioteca Digital</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="ra">RA / Login</label>
                    <input type="text" id="ra" placeholder="Ex: 123 ou admin" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>
                <button type="submit">Entrar no Sistema</button>
                <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted); text-align: center;">
                    Dica: Use <b>123/123</b> para Aluno ou <b>admin/admin</b> para Admin.
                </p>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const ra = document.getElementById('ra').value;
            const senha = document.getElementById('senha').value;
            
            const user = LibraryApp.login(ra, senha);
            if (user) {
                if (user.tipo === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                alert('RA ou senha incorretos!');
            }
        });
    </script>
</body>
</html>
