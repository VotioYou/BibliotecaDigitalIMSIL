<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo digital de livros — Busque, explore e reserve livros do acervo da Biblioteca Digital IMSIL.">
    <title>Catálogo — Biblioteca Digital IMSIL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><span class="logo-icon">📚</span> Biblioteca Digital</div>
        <nav>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="catalogo.html" class="nav-link active">Catálogo</a>
            <button class="btn btn-sm btn-ghost" onclick="Auth.logout()">Sair</button>
        </nav>
    </header>

    <main>
        <div class="page-header flex-row">
            <div>
                <h1>Catálogo Digital</h1>
                <p>Explore o acervo e busque novos livros via Google Books</p>
            </div>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por título ou autor...">
            </div>
        </div>

        <!-- Tabs: Acervo Local / Busca Online -->
        <div class="filter-tabs mb-2">
            <button class="filter-tab active" data-source="local">📖 Acervo Local</button>
            <button class="filter-tab" data-source="api">🌐 Buscar Online (Google Books)</button>
        </div>

        <div id="catalogContent">
            <!-- Conteúdo renderizado via JS -->
        </div>
    </main>

    <script src="js/config.js" onerror="console.log('[Config] config.js não encontrado, usando modo sem API Key.')"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        const user = Auth.protegerRota('any');
        if (!user) throw new Error('Redirecionando...');

        // Corrigir link do Dashboard para admin
        const dashLink = document.querySelector('a[href="dashboard.html"]');
        if (user.tipo === 'admin' && dashLink) {
            dashLink.href = 'admin.html';
            dashLink.textContent = 'Painel Admin';
        }

        // Se for admin, adiciona link do painel
        if (user.tipo === 'admin') {
            const nav = document.querySelector('nav');
            const adminLink = document.createElement('a');
            adminLink.href = 'admin.html';
            adminLink.className = 'nav-link';
            adminLink.textContent = 'Gestão';
            nav.insertBefore(adminLink, nav.firstChild);
        }

        const searchInput = document.getElementById('searchInput');
        const catalogContent = document.getElementById('catalogContent');
        const tabs = document.querySelectorAll('.filter-tab[data-source]');
        let currentSource = 'local';
        let searchTimeout = null;

        // --- Tab switching ---
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSource = tab.dataset.source;
                searchInput.value = '';
                if (currentSource === 'local') {
                    renderLocal();
                } else {
                    UI.mostrarVazio(catalogContent, 'Digite um termo acima para buscar livros no Google Books.', '🌐');
                }
            });
        });

        // --- Busca com debounce ---
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = searchInput.value.trim();

            searchTimeout = setTimeout(async () => {
                if (currentSource === 'local') {
                    renderLocal(query);
                } else {
                    if (query.length < 2) {
                        UI.mostrarVazio(catalogContent, 'Digite pelo menos 2 caracteres para buscar.', '🌐');
                        return;
                    }
                    await renderAPI(query);
                }
            }, 400);
        });

        function renderLocal(filtro = '') {
            const livros = App.getCatalogoLocal(filtro);
            UI.renderGridLivros(catalogContent, livros, true);
        }

        async function renderAPI(query) {
            UI.mostrarLoading(catalogContent, 'Buscando livros...');
            try {
                const resultados = await App.buscarLivrosAPI(query);
                if (resultados.length === 0) {
                    UI.mostrarVazio(catalogContent, `Nenhum resultado encontrado para "${query}".`, '🔍');
                } else {
                    UI.renderGridLivros(catalogContent, resultados, true);
                }
            } catch (err) {
                console.error('[Catalogo] Erro na busca:', err);
                if (err.message === 'QUOTA_EXCEEDED') {
                    UI.mostrarErro(catalogContent, 'Limite de buscas do Google atingido. Tente novamente em alguns minutos.');
                } else {
                    UI.mostrarErro(catalogContent, 'Falha ao conectar com a API. Verifique sua conexão e tente novamente.');
                }
            }
        }

        // Render inicial
        renderLocal();
    </script>
</body>
</html>
