<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo digital de livros — Busque, explore e reserve livros do acervo da Biblioteca Digital IMSIL.">
    <title>Catálogo — Biblioteca Digital IMSIL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><span class="logo-icon">📚</span> Biblioteca Digital</div>
        <nav>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="catalogo.html" class="nav-link active">Catálogo</a>
            <button class="btn btn-sm btn-ghost" onclick="Auth.logout()">Sair</button>
        </nav>
    </header>

    <main>
        <div class="page-header flex-row">
            <div>
                <h1>Catálogo Digital</h1>
                <p>Explore o acervo unificado da Biblioteca Digital IMSIL</p>
            </div>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por título ou autor...">
            </div>
        </div>

        <div id="catalogContent">
            <!-- Conteúdo renderizado via JS -->
        </div>
    </main>

    <script src="js/config.js" onerror="console.log('[Config] config.js não encontrado, usando modo sem API Key.')"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        const user = Auth.protegerRota('any');
        if (!user) throw new Error('Redirecionando...');

        // Corrigir link do Dashboard para admin
        const dashLink = document.querySelector('a[href="dashboard.html"]');
        if (user.tipo === 'admin' && dashLink) {
            dashLink.href = 'admin.html';
            dashLink.textContent = 'Painel Admin';
        }

        // Se for admin, adiciona link do painel
        if (user.tipo === 'admin') {
            const nav = document.querySelector('nav');
            const adminLink = document.createElement('a');
            adminLink.href = 'admin.html';
            adminLink.className = 'nav-link';
            adminLink.textContent = 'Gestão';
            nav.insertBefore(adminLink, nav.firstChild);
        }

        const searchInput = document.getElementById('searchInput');
        const catalogContent = document.getElementById('catalogContent');
        let searchTimeout = null;

        // --- Busca com debounce ---
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = searchInput.value.trim();

            searchTimeout = setTimeout(async () => {
                if (query.length === 0) {
                    await renderHome();
                    return;
                }
                
                if (query.length < 2) {
                    UI.mostrarVazio(catalogContent, 'Digite pelo menos 2 caracteres para buscar.', '🔍');
                    return;
                }
                
                await renderBusca(query);
            }, 500);
        });

        async function renderHome() {
            UI.mostrarLoading(catalogContent, 'Preparando curadoria de livros para você...');
            try {
                const resultados = await App.getCuradoriaHome();
                if (resultados.length === 0) {
                    UI.mostrarVazio(catalogContent, 'Nenhum livro disponível no momento.', '📚');
                } else {
                    UI.renderGridLivros(catalogContent, resultados, true);
                }
            } catch (err) {
                console.error('[Catalogo] Erro ao carregar home:', err);
                UI.mostrarErro(catalogContent, 'Falha ao carregar catálogo. Tente novamente mais tarde.');
            }
        }

        async function renderBusca(query) {
            UI.mostrarLoading(catalogContent, 'Buscando em todo o acervo...');
            try {
                const resultados = await App.buscarLivrosAPI(query);
                if (resultados.length === 0) {
                    UI.mostrarVazio(catalogContent, `Nenhum resultado encontrado para "${query}".`, '🔍');
                } else {
                    UI.renderGridLivros(catalogContent, resultados, true);
                }
            } catch (err) {
                console.error('[Catalogo] Erro na busca:', err);
                UI.mostrarErro(catalogContent, 'Falha ao realizar a busca. Verifique sua conexão e tente novamente.');
            }
        }

        // Render inicial
        renderHome();
    </script>
</body>
</html>
