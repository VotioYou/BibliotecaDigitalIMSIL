<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo - Biblioteca Digital</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><b>📚 Biblioteca Digital</b></div>
        <nav>
            <a href="dashboard.html" style="margin-right: 1.5rem; text-decoration: none; color: var(--text-muted);">Início</a>
            <a href="catalogo.html" style="margin-right: 1.5rem; text-decoration: none; color: var(--primary); font-weight: 600;">Ver Acervo</a>
            <button onclick="LibraryApp.logout()" class="btn-small btn-secondary">Sair</button>
        </nav>
    </header>

    <main>
        <div class="flex-row">
            <h1>Acervo Digital</h1>
            <input type="text" id="searchInput" placeholder="Buscar por título ou autor..." style="max-width: 300px;">
        </div>

        <div id="bookGrid" class="book-grid">
            <!-- Preenchido via JS -->
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        const user = LibraryApp.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        function renderBooks(filter = '') {
            const books = LibraryApp.getBooks();
            const container = document.getElementById('bookGrid');
            
            const filteredBooks = books.filter(b => 
                b.titulo.toLowerCase().includes(filter.toLowerCase()) || 
                b.autor.toLowerCase().includes(filter.toLowerCase())
            );

            container.innerHTML = filteredBooks.map(book => `
                <div class="book-card">
                    <img src="${book.capa}" alt="${book.titulo}" class="book-cover">
                    <div class="book-info">
                        <div class="book-title">${book.titulo}</div>
                        <div class="book-author">${book.autor}</div>
                        <div class="flex-row">
                            <span class="badge ${book.disponivel ? 'badge-approved' : 'badge-overdue'}">
                                ${book.disponivel ? 'Disponível' : 'Indisponível'}
                            </span>
                            ${book.disponivel ? `<button onclick="LibraryApp.reserveBook(${book.id})" class="btn-small">Reservar</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderBooks(e.target.value);
        });

        renderBooks();
    </script>
</body>
</html>
